<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Token Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- FULL-SCREEN TOKEN GRID -->
  <div class="token-grid" id="tokenGrid"></div>

  <!-- FIXED BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="btn-bar btn-reset" id="resetAll">⬛ Reset All</button>
    <button class="btn-bar btn-untap" id="untapAll">☀ Untap All</button>
    <div class="manufactor-control">
      <button class="btn-mfact-adj" id="mfactDec">−</button>
      <div class="mfact-display">
        <span class="mfact-count" id="mfactCount">0</span>
        <span class="mfact-label">⚙ Manufactor</span>
      </div>
      <button class="btn-mfact-adj" id="mfactInc">+</button>
    </div>
    <button class="btn-bar btn-add"   id="openSearch">+ Add Token</button>
  </div>

  <!-- SEARCH MODAL -->
  <div class="modal-overlay" id="searchModal" hidden>
    <div class="modal">
      <div class="modal-head">
        <span class="modal-title">Add Token</span>
        <button class="modal-close" id="closeSearch">✕</button>
      </div>
      <input class="search-input" id="searchInput" type="text"
        placeholder="Search tokens… e.g. Soldier, Treasure"
        autocomplete="off" autocorrect="off" spellcheck="false" />
      <div class="search-results" id="searchResults">
        <p class="search-hint">Start typing to search Scryfall.</p>
      </div>
    </div>
  </div>

  <!-- SET VALUE MODAL -->
  <div class="modal-overlay" id="setValueModal" hidden>
    <div class="modal modal-sm">
      <div class="modal-head">
        <span class="modal-title" id="setValueTitle">Set value</span>
        <button class="modal-close" id="closeSetValue">✕</button>
      </div>
      <div class="set-value-body">
        <p class="set-value-hint" id="setValueHint">Enter the new count</p>
        <div class="set-value-input-row">
          <button class="btn-sv-adj" id="svDec">−</button>
          <input class="set-value-input" id="setValueInput" type="number" min="0" max="9999" inputmode="numeric" />
          <button class="btn-sv-adj" id="svInc">+</button>
        </div>
        <div class="set-value-actions">
          <button class="btn-sv-cancel" id="cancelSetValue">Cancel</button>
          <button class="btn-sv-confirm" id="confirmSetValue">Set Value</button>
        </div>
      </div>
    </div>
  </div>

  <!-- RESET ALL CONFIRM MODAL -->
  <div class="modal-overlay" id="resetModal" hidden>
    <div class="modal modal-sm">
      <div class="modal-head">
        <span class="modal-title">Reset All Tokens?</span>
        <button class="modal-close" id="closeReset">✕</button>
      </div>
      <div class="set-value-body">
        <p class="set-value-hint">This will set every token's tapped and untapped count to 0.</p>
        <div class="set-value-actions">
          <button class="btn-sv-cancel" id="cancelReset">Cancel</button>
          <button class="btn-sv-confirm btn-sv-danger" id="confirmReset">Reset All</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
