<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Token Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- PLAYER SELECT TABS -->
<header class="app-header">
  <div class="app-title">⚔ Token Tracker</div>
  <div class="player-tabs" id="playerTabs">
    <button class="player-tab active" data-player="0">P1</button>
    <button class="player-tab" data-player="1">P2</button>
    <button class="player-tab" data-player="2">P3</button>
    <button class="player-tab" data-player="3">P4</button>
  </div>
</header>

<!-- MAIN AREA -->
<main class="main" id="main">

  <!-- TOKEN LIST FOR ACTIVE PLAYER -->
  <div class="token-list" id="tokenList"></div>

  <!-- BOTTOM ACTION BAR -->
  <div class="action-bar">
    <button class="btn-untap-all" id="untapAll">☀ Untap All</button>
    <button class="btn-add-token" id="openSearch">+ Add Token</button>
  </div>

</main>

<!-- SEARCH MODAL -->
<div class="modal-overlay" id="searchModal" hidden>
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add Token</span>
      <button class="modal-close" id="closeSearch">✕</button>
    </div>
    <input
      class="search-input"
      id="searchInput"
      type="text"
      placeholder="Search tokens… (e.g. Soldier, Zombie)"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <div class="search-results" id="searchResults">
      <p class="search-hint">Start typing to search Scryfall for token cards.</p>
    </div>
  </div>
</div>

<!-- SACRIFICE CONFIRM (tap/untap source picker) -->
<div class="modal-overlay" id="sacrificeModal" hidden>
  <div class="modal modal-sm">
    <div class="modal-header">
      <span class="modal-title" id="sacrificeTitle">Sacrifice from…</span>
      <button class="modal-close" id="closeSacrifice">✕</button>
    </div>
    <div class="sacrifice-options">
      <button class="btn-sacrifice-from" id="sacrificeUntapped">💚 Untapped</button>
      <button class="btn-sacrifice-from" id="sacrificeTapped">🔴 Tapped</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
